<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hearsay — Variant B: The Table (Balatro-forward)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --felt:      #1e3a2f;
    --felt-dark: #0d1f17;
    --amber:     #fda200;
    --coral:     #fd5f55;
    --sky:       #009cfd;
    --slate:     #4f6367;
    --bone:      #f4ecd8;
    --bone-dim:  #c9bfa3;
    --navy:      #1a2130;
    --blood:     #8b1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: var(--felt);
    color: var(--bone);
    font-family: 'VT323', monospace;
    font-size: 20px;
    position: relative;
    image-rendering: pixelated;
  }
  .scene {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 70% at 50% 50%, rgba(30, 58, 47, 0.4), var(--felt-dark) 85%),
      var(--felt);
  }
  /* CRT scanlines — Balatro trick */
  .scene::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(0, 0, 0, 0.13) 3px,
      rgba(0, 0, 0, 0.13) 3px
    );
    z-index: 3;
  }
  /* Slight CRT barrel + vignette */
  .scene::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
    z-index: 4;
  }
  .content {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 32px 48px 0 48px;
  }
  /* Top bar: opponent + strikes */
  .top {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 32px;
    align-items: center;
  }
  .portrait-row {
    display: flex; align-items: center; gap: 16px;
  }
  .portrait {
    width: 88px; height: 112px;
    background: linear-gradient(160deg, var(--navy) 0%, #08101e 100%);
    border: 3px solid var(--amber);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(253, 162, 0, 0.4), 4px 4px 0 0 var(--felt-dark);
    font-family: 'Press Start 2P', monospace;
    font-size: 32px;
    color: var(--amber);
  }
  .portrait-meta {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    line-height: 1.6;
    letter-spacing: 1px;
  }
  .portrait-name { color: var(--amber); }
  .portrait-sub  { color: var(--bone-dim); margin-top: 6px; font-size: 8px; }
  .target {
    display: flex; flex-direction: column; align-items: center;
    font-family: 'Press Start 2P', monospace;
    padding: 8px 18px;
    border: 2px solid var(--sky);
    background: rgba(0, 156, 253, 0.1);
    box-shadow: 0 0 20px rgba(0, 156, 253, 0.25), 3px 3px 0 0 var(--felt-dark);
  }
  .target-label {
    font-size: 8px; color: var(--bone-dim);
    letter-spacing: 2px; margin-bottom: 4px;
  }
  .target-value {
    font-size: 20px; color: var(--sky);
  }
  .strikes {
    display: flex; gap: 8px; align-items: center;
  }
  .strike {
    width: 28px; height: 28px;
    background: var(--felt-dark);
    border: 2px solid var(--slate);
    border-radius: 2px;
    box-shadow: 2px 2px 0 0 rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: transparent;
  }
  .strike.lit {
    background: linear-gradient(180deg, var(--coral) 0%, var(--blood) 100%);
    border-color: var(--coral);
    color: var(--bone);
    box-shadow: 0 0 16px rgba(253, 95, 85, 0.8), 2px 2px 0 0 rgba(0,0,0,0.5);
  }
  .strike.lit::after { content: "X"; }
  /* Center — claim + pile */
  .table {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 48px;
    padding: 24px 0;
  }
  .lie-score {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    font-family: 'Press Start 2P', monospace;
  }
  .lie-score-label {
    font-size: 8px; color: var(--bone-dim); letter-spacing: 2px;
  }
  .lie-score-bar {
    width: 160px; height: 20px;
    background: var(--felt-dark);
    border: 2px solid var(--slate);
    position: relative;
    box-shadow: 2px 2px 0 0 rgba(0,0,0,0.5);
  }
  .lie-score-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    width: 62%;
    background: linear-gradient(90deg, var(--sky) 0%, var(--amber) 50%, var(--coral) 100%);
  }
  .lie-score-value {
    font-size: 14px;
    color: var(--amber);
  }
  .pile {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .pile-cards {
    position: relative; width: 80px; height: 116px;
  }
  .pile-card {
    position: absolute; inset: 0;
    background: var(--bone);
    border: 3px solid var(--navy);
    border-radius: 4px;
    box-shadow: 3px 3px 0 0 rgba(0,0,0,0.4);
  }
  .pile-card:nth-child(1) { transform: rotate(-6deg) translateX(-6px); }
  .pile-card:nth-child(2) { transform: rotate(3deg); }
  .pile-card:nth-child(3) { transform: rotate(-1deg) translateX(4px); }
  .pile-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; color: var(--bone-dim); letter-spacing: 2px;
  }
  .claim {
    display: flex; flex-direction: column; gap: 12px; align-items: flex-start;
  }
  .claim-bubble {
    background: var(--navy);
    border: 3px solid var(--amber);
    padding: 16px 24px;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--amber);
    box-shadow: 4px 4px 0 0 var(--felt-dark), 0 0 20px rgba(253, 162, 0, 0.4);
    position: relative;
    letter-spacing: 1px;
  }
  .claim-bubble::before {
    content: "";
    position: absolute; top: 100%; left: 40px;
    border: 8px solid transparent;
    border-top-color: var(--amber);
  }
  .claim-meta {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px; color: var(--bone-dim); letter-spacing: 2px;
  }
  /* Hand */
  .hand {
    display: flex; justify-content: center; align-items: flex-end; padding-bottom: 24px;
  }
  .card {
    width: 96px; height: 140px;
    background: var(--bone);
    border: 3px solid var(--navy);
    border-radius: 6px;
    box-shadow: 4px 4px 0 0 rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
    padding: 8px;
    color: var(--navy);
    position: relative;
    transition: transform 0.2s;
  }
  .card:not(:first-child) { margin-left: -14px; }
  .card:nth-child(1) { transform: rotate(-6deg) translateY(8px); }
  .card:nth-child(2) { transform: rotate(-2deg) translateY(0); }
  .card:nth-child(3) { transform: rotate(3deg) translateY(-4px); }
  .card:nth-child(4) { transform: rotate(7deg) translateY(6px); }
  .card:hover { transform: translateY(-12px); z-index: 5; }
  .card-rank-tl {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px; line-height: 1; text-align: left;
  }
  .card-rank-mid {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 36px;
  }
  .card-rank-br {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px; line-height: 1; text-align: right;
    transform: rotate(180deg);
  }
  /* Actions */
  .actions {
    position: absolute; bottom: 24px; left: 48px; right: 48px;
    z-index: 11;
    display: flex; justify-content: space-between; align-items: center;
  }
  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px; letter-spacing: 2px;
    background: var(--felt-dark);
    color: var(--amber);
    border: 3px solid var(--amber);
    padding: 14px 28px;
    cursor: pointer;
    box-shadow: 4px 4px 0 0 rgba(0,0,0,0.6);
    text-transform: uppercase;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 0 rgba(0,0,0,0.6); }
  .btn-challenge { color: var(--coral); border-color: var(--coral); }
  .variant-label {
    position: absolute; top: 16px; right: 16px; z-index: 20;
    font-family: 'VT323', monospace;
    font-size: 13px; color: var(--bone-dim);
    letter-spacing: 2px; opacity: 0.6;
  }
</style>
</head>
<body>
<div class="variant-label">VARIANT B · THE TABLE · BALATRO-FORWARD</div>
<div class="scene">
  <div class="content">
    <div class="top">
      <div class="portrait-row">
        <div class="portrait">R</div>
        <div class="portrait-meta">
          <div class="portrait-name">THE READER</div>
          <div class="portrait-sub">LISTENING · ROUND 1</div>
        </div>
      </div>
      <div class="target">
        <div class="target-label">TARGET</div>
        <div class="target-value">QUEEN</div>
      </div>
      <div class="strikes">
        <div class="strike lit"></div>
        <div class="strike"></div>
        <div class="strike"></div>
      </div>
    </div>
    <div class="table">
      <div class="lie-score">
        <div class="lie-score-label">LIE SCORE</div>
        <div class="lie-score-bar"><div class="lie-score-fill"></div></div>
        <div class="lie-score-value">0.62</div>
      </div>
      <div class="pile">
        <div class="pile-cards">
          <div class="pile-card"></div>
          <div class="pile-card"></div>
          <div class="pile-card"></div>
        </div>
        <div class="pile-label">PILE · 3</div>
      </div>
      <div class="claim">
        <div class="claim-bubble">"TWO QUEENS."</div>
        <div class="claim-meta">READER · 2.4S LATENCY · 1 FILLER</div>
      </div>
    </div>
    <div class="hand">
      <div class="card">
        <div class="card-rank-tl">Q</div>
        <div class="card-rank-mid">Q</div>
        <div class="card-rank-br">Q</div>
      </div>
      <div class="card">
        <div class="card-rank-tl">K</div>
        <div class="card-rank-mid">K</div>
        <div class="card-rank-br">K</div>
      </div>
      <div class="card">
        <div class="card-rank-tl">A</div>
        <div class="card-rank-mid">A</div>
        <div class="card-rank-br">A</div>
      </div>
      <div class="card">
        <div class="card-rank-tl">J</div>
        <div class="card-rank-mid">J</div>
        <div class="card-rank-br">J</div>
      </div>
    </div>
  </div>
  <div class="actions">
    <button class="btn">ACCEPT</button>
    <button class="btn btn-challenge">LIAR!</button>
  </div>
</div>
</body>
</html>
